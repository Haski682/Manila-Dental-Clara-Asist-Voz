# ============================================
# SOFIA.CONFIG.YAML
# Configuracion de tu agente de voz con IA
# ============================================

version: "1.0"

# --- DATOS DEL NEGOCIO ---
business:
  name: "Manila Dental"
  industry: "dental"
  timezone: "America/Bogota"
  phone: ""
  address: "Edificio Manila Center, Calle 12 #43E-22, El Poblado, Medellin, Colombia"
  website: "http://maniladentalstudio.com/"
  hours: "Lunes a Viernes 8:00-18:00, Sabados 8:00-12:00"

# --- AGENTE DE VOZ ---
agent:
  name: "Clara"
  voice_id: "custom_voice_ed2c397a23e58b7c83e078372a"
  language: "es-419"
  personality: "amable, profesional"

# --- LLAMADAS SALIENTES (OUTBOUND) ---
outbound:
  enabled: true
  schedule: "09:00-17:00"
  max_daily_calls: 20
  days:
    - "lun"
    - "mar"
    - "mie"
    - "jue"
    - "vie"

# --- CRM (Base de datos en Notion) ---
crm:
  product_name: "Tratamientos"
  product_fields:
    - name: "Tratamiento"
      type: "title"
    - name: "Precio"
      type: "number"
      format: "dollar"
    - name: "Duracion"
      type: "rich_text"
    - name: "Categoria"
      type: "select"
      options: ["Limpieza", "Ortodoncia", "Implantes", "Blanqueamiento", "Endodoncia", "Cirugia", "Estetica"]
    - name: "Incluye"
      type: "rich_text"
  lead_extra_fields:
    - name: "Tratamiento de interes"
      type: "select"
      options: ["Limpieza", "Ortodoncia", "Implantes", "Blanqueamiento", "Valoracion general", "Urgencia"]
    - name: "Urgencia"
      type: "select"
      options: ["Urgente (dolor)", "Esta semana", "Este mes", "Solo explorando"]
    - name: "Seguro dental"
      type: "select"
      options: ["Si", "No", "No se"]
    - name: "Condicion medica"
      type: "rich_text"

# --- APARIENCIA DEL DASHBOARD ---
branding:
  primary_color: "#1c1917"
  logo_text: "MANILA"
  dashboard_title: "Manila Dental"
